name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # every Monday and Thursday at 9:00 UTC
  workflow_dispatch:        # lets you trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "https://tvlokudlhoeymjlhwnoi.supabase.co/rest/v1/perfumes?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
